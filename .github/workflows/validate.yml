name: Validate Template

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install baseline prerequisites
        run: deno task install

      - name: Run canonical validation
        run: deno task validate

      - name: Smoke runtime fixture
        run: deno task smoke

      - name: Verify clean worktree after baseline commands
        run: |
          if [[ -n "$(git status --short)" ]]; then
            git status --short
            exit 1
          fi

      - name: Upload transient artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transient-artifacts
          path: .tmp/improvement/
