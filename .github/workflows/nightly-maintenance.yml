name: Nightly Maintenance

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify prerequisites
        run: deno task install

      - name: Run GC reports
        run: |
          deno task gc-docs
          deno task gc-structure
          deno task gc-ledger

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-maintenance-artifacts
          path: docs/generated/improvement/
